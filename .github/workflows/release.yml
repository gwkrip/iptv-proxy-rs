name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BIN: iptv-proxy

jobs:
  # ── Create the GitHub Release first ─────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version:    ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        run: |
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD \
            --pretty=format:"- %s (%h)" \
            --no-merges > CHANGELOG_ENTRY.md || echo "Initial release" > CHANGELOG_ENTRY.md
          cat CHANGELOG_ENTRY.md

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name:     ${{ github.ref }}
          release_name: "iptv-proxy v${{ steps.get_version.outputs.version }}"
          body_path:    CHANGELOG_ENTRY.md
          draft:        false
          prerelease:   ${{ contains(github.ref, '-') }}

  # ── Build matrix ─────────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.target }}
    needs: create-release
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── x86_64 ────────────────────────────────────────────────────────
          - target: x86_64-unknown-linux-gnu
            cross:  false

          - target: x86_64-unknown-linux-musl
            cross:  false

          # ── aarch64 (arm64) ───────────────────────────────────────────────
          - target: aarch64-unknown-linux-gnu
            cross:  true

          - target: aarch64-unknown-linux-musl
            cross:  true

          # ── armv7 (arm32) ─────────────────────────────────────────────────
          - target: armv7-unknown-linux-gnueabihf
            cross:  true

          - target: armv7-unknown-linux-musleabihf
            cross:  true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ── Native deps untuk non-cross musl build ─────────────────────────────
      - name: Install musl tools (native x86_64-musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools

      # ── cross untuk semua target cross-compile ─────────────────────────────
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --locked

      # ── Package ────────────────────────────────────────────────────────────
      - name: Package
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          ASSET_NAME="${{ env.BIN }}-v${VERSION}-${{ matrix.target }}"
          mkdir -p dist/$ASSET_NAME
          cp target/${{ matrix.target }}/release/${{ env.BIN }} dist/$ASSET_NAME/
          cp README.md LICENSE dist/$ASSET_NAME/ 2>/dev/null || true
          tar -C dist -czf dist/$ASSET_NAME.tar.gz $ASSET_NAME
          echo "ASSET=dist/$ASSET_NAME.tar.gz" >> $GITHUB_ENV
          echo "ASSET_NAME=$ASSET_NAME.tar.gz"  >> $GITHUB_ENV

      # ── Upload ke release ──────────────────────────────────────────────────
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url:         ${{ needs.create-release.outputs.upload_url }}
          asset_path:         ${{ env.ASSET }}
          asset_name:         ${{ env.ASSET_NAME }}
          asset_content_type: application/gzip
